name: Publish

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: publish
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - uses: oven-sh/setup-bun@v2

      # Auth via NPM_TOKEN (Automation Token) repo secret. `id-token: write`
      # is still required so `--provenance` can sign the build provenance via
      # the GitHub OIDC token; the publish itself uses the token.
      #
      # Node 24 is pinned for npm 11+ (newer publish UX + provenance support).
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bunx biome check packages

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: 'true'
        run: >
          npx --yes
          -p semantic-release@24
          -p @semantic-release/changelog@6
          -p @semantic-release/exec@6
          -p @semantic-release/git@10
          -p conventional-changelog-conventionalcommits@7
          semantic-release
